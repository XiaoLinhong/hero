<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hero - Loading...</title>
    <style> 
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 0;
        }

        /* 加载层样式 */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease-out;
        }

        /* 飞船穿梭动画 */
        .rocket {
            width: 50px;
            margin-bottom: 20px;
            fill: #3498db;
            animation: moveRocket 1.5s infinite ease-in-out;
        }

        @keyframes moveRocket {
            0%, 100% { transform: translateY(0px) rotate(-45deg); }
            50% { transform: translateY(-20px) rotate(-45deg); }
        }

        /* 进度条轨道 */
        .progress-container {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        /* 进度条光效 */
        .progress-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #3498db, transparent);
            position: absolute;
            left: -100%;
            animation: loading 2s infinite;
        }

        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .text {
            color: #3498db;
            margin-top: 15px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }
    </style>
</head>
<body>
    <div id="loader">
        <svg class="rocket" viewBox="0 0 24 24">
            <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
        </svg>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="text">System Initializing...</div>
    </div>

    <canvas id="glcanvas" tabindex='1'></canvas>

    <script src="mq_js_bundle.js"></script>
    <script>
        // 记录加载状态
        const loader = document.getElementById('loader');
        
        // 封装原有的 load 函数
        async function start() {
            try {
                await load("hero.wasm");
                // 当 WASM 准备就绪时，淡出加载层
                // 注意：Macroquad 启动后会自动接管 Canvas
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }, 100);
            } catch (e) {
                document.querySelector('.text').innerText = "Load Failed";
                console.error(e);
            }
        }
        
        start();
    </script>
</body>
</html>
